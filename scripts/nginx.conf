# Nginx reverse proxy. Run this as one more container (or install
# directly on the EC2 host) so the public-facing ports are just 80/443, not
# 3000 and 8000 - one less thing to explain/secure, and it's where SSL
# (certbot) would terminate if you add a real domain later.
#
# Place at /etc/nginx/sites-available/nexusai.conf (or mount into an nginx
# container) and point server_name at your EC2 public IP or domain.

server {
    listen 80;
    server_name _;

    location /api/ {
        proxy_pass http://localhost:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # RAG generation streams tokens - don't let nginx buffer the whole
        # response before sending it on, or "streaming" stops feeling real-time
        proxy_buffering off;
    }

    location / {
        proxy_pass http://localhost:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
