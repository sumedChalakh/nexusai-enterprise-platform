apiVersion: v1
kind: Namespace
metadata:
  name: nexusai
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nexusai-config
  namespace: nexusai
data:
  APP_NAME: "NexusAI"
  DEBUG: "false"
  REDIS_URL: "redis://redis:6379"
  QDRANT_URL: "http://qdrant:6333"
  CORS_ORIGINS: "http://nexusai.local"
---
# Template only - never commit real values here. Generate the real Secret
# with: kubectl create secret generic nexusai-secrets --from-env-file=backend/.env -n nexusai
apiVersion: v1
kind: Secret
metadata:
  name: nexusai-secrets
  namespace: nexusai
type: Opaque
stringData:
  DATABASE_URL: "REPLACE_ME"
  JWT_SECRET: "REPLACE_ME"
  GEMINI_API_KEY: "REPLACE_ME"
  AWS_ACCESS_KEY_ID: "REPLACE_ME"
  AWS_SECRET_ACCESS_KEY: "REPLACE_ME"
