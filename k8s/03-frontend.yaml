apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: nexusai
spec:
  replicas: 2
  selector:
    matchLabels: { app: frontend }
  template:
    metadata:
      labels: { app: frontend }
    spec:
      containers:
        - name: frontend
          image: ghcr.io/sumedchalakh/nexusai-enterprise-platform/frontend:latest
          ports: [{ containerPort: 3000 }]
          readinessProbe:
            httpGet: { path: /, port: 3000 }
            initialDelaySeconds: 10
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits: { cpu: "500m", memory: "512Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: nexusai
spec:
  selector: { app: frontend }
  ports: [{ port: 3000, targetPort: 3000 }]
